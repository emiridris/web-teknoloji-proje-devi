    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* Tasarım Tutarlılığı İçin Stiller */
        body { background-color: #f8f9fa; }
        .text-info-custom { color: #0dcaf0; }
        .bg-dark-blue { background-color: #001f3f; }

        .social-btn {
            transition: all 0.3s ease;
            opacity: 0.8;
        }
        .social-btn:hover {
            transform: translateY(-5px);
            opacity: 1;
            color: #0dcaf0 !important;
        }
        footer h5 {
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-blue shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Amir <span class="text-info-custom">Idres</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">

                    <a class="nav-link" href="login.php">Login</a>
                    <a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a>
                </div>
            </div>
        </div>
    </nav>

    <main id="app" v-cloak class="container shadow rounded-4 p-4 p-md-5 my-5 bg-white">
        
        <h2 class="text-center mb-5 fw-bold">Bana <span class="text-primary">Ulaşın</span></h2>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <form action="gonder.php" method="POST" id="contactForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Ad Soyad</label>
                            <input v-model="formData.fullName" type="text" name="ad_soyad" class="form-control form-control-lg border-2" placeholder="Adınızı giriniz..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">E-posta</label>
                            <input v-model="formData.email" type="email" name="email" class="form-control form-control-lg border-2" placeholder="Email adresiniz..." required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label fw-bold small">Konu</label>
                            <select name="konu" class="form-select form-select-lg border-2" required>
                                <option value="" disabled selected>Bir konu seçiniz...</option>
                                <option value="Genel Bilgi">Genel Bilgi</option>
                                <option value="Hata Bildirimi">Hata Bildirimi</option>
                                <option value="Öneri">Öneri / Tavsiye</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold small">Mesajınız</label>
                            <textarea v-model="formData.message" name="mesaj" class="form-control border-2" rows="6" placeholder="Bana ne söylemek istersiniz?" required></textarea>
                        </div>

                        <div class="col-12 text-center mt-4">
                            <button type="submit" class="btn btn-primary bg-dark-blue btn-lg px-5 shadow-sm me-2">
                                <i class="fas fa-paper-plane me-2"></i> Formu Gönder
                            </button>
                            <button type="button" @click="clearForm" class="btn btn-outline-danger btn-lg px-4 shadow-sm">
                                <i class="fas fa-trash-can me-2"></i> Temizle
                            </button>
                        </div>
                    </div>
                </form>

                <div class="mt-5 p-4 bg-light rounded-3 border" v-if="formData.fullName || formData.message">
                    <h6 class="fw-bold text-muted mb-3"><i class="fas fa-eye me-2"></i> Canlı Önizleme</h6>
                    <p class="mb-1"><strong>Gönderen:</strong> {{ formData.fullName }}</p>
                    <p class="mb-0"><strong>Mesaj Karakter Sayısı:</strong> {{ formData.message.length }}</p>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-5 mt-auto bg-dark-blue text-white">
        <div class="container text-center">
            <div class="row">
                <div class="col-12">
                    <h5 class="fw-bold mb-3">MHD AMIR IDRES</h5>
                    <div class="d-flex justify-content-center gap-4 mb-4">
                        <a href="https://github.com/emiridris" target="_blank" class="text-white social-btn"><i class="fab fa-github fa-2x"></i></a>
                        <a href="https://www.instagram.com/emiridris54" target="_blank" class="text-white social-btn"><i class="fab fa-instagram fa-2x"></i></a>
                    </div>
                    <p class="mb-0 small text-light opacity-50">&copy; 2026 - Tüm Hakları Saklıdır | Web Teknolojileri Projesi</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    formData: {
                        fullName: '',
                        email: '',
                        message: ''
                    }
                }
            },
            methods: {
                clearForm() {
                    // Kullanıcıdan onay alarak temizleme işlemi
                    if(confirm("Formdaki tüm verileri temizlemek istediğinize emin misiniz?")) {
                        this.formData.fullName = '';
                        this.formData.email = '';
                        this.formData.message = '';
                        // Select kutusunu da sıfırlamak için formun kendisini resetle
                        document.getElementById('contactForm').reset();
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
